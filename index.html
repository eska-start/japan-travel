<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Odyssey - 일본 여행 플래너</title>
    <link rel="stylesheet" href="style.css?v=3.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside>
            <div class="logo" style="font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 3rem;">
                <i class="fas fa-torii-gate"></i> JAPAN ODYSSEY <span style="font-size: 0.7rem; vertical-align: middle; opacity: 0.5;">v3.5</span>
            </div>
            <nav>
                <ul style="list-style: none;">
                    <li style="margin-bottom: 1.5rem;"><a href="#" style="text-decoration: none; color: var(--text-main); font-weight: 600;"><i class="fas fa-home" style="margin-right: 10px;"></i> 대시보드</a></li>
                    <li style="margin-bottom: 1.5rem;"><a href="#flights" style="text-decoration: none; color: var(--text-sub);"><i class="fas fa-plane" style="margin-right: 10px;"></i> 항공편</a></li>
                    <li style="margin-bottom: 1.5rem;"><a href="#rental" style="text-decoration: none; color: var(--text-sub);"><i class="fas fa-car" style="margin-right: 10px;"></i> 렌트카</a></li>
                    <li style="margin-bottom: 1.5rem;"><a href="#accommodation" style="text-decoration: none; color: var(--text-sub);"><i class="fas fa-hotel" style="margin-right: 10px;"></i> 숙소 & 세부 일정</a></li>
                </ul>
            </nav>
            
            <div class="currency-widget" style="margin-top: 4rem; background: var(--bg); padding: 1rem; border-radius: 12px;">
                <p style="font-size: 0.8rem; color: var(--text-sub);">실시간 환율 (JPY/KRW)</p>
                <p id="exchange-rate" style="font-weight: 700; margin-top: 5px;">로딩 중...</p>
                <p id="last-update" style="font-size: 0.6rem; color: var(--text-sub); margin-top: 5px;"></p>
            </div>

            <div class="trip-selector" style="margin-top: 2rem; background: var(--bg); padding: 1rem; border-radius: 12px; border: 1px solid #eee;">
                <p style="font-size: 0.8rem; color: var(--text-sub); margin-bottom: 10px;">여행 코드 입력 (공유용)</p>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="trip-id-input" placeholder="코드 입력" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.8rem;">
                    <button onclick="joinTrip()" style="padding: 8px 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;"><i class="fas fa-arrow-right"></i></button>
                </div>
                <p id="current-trip-id" style="font-size: 0.7rem; color: var(--primary); margin-top: 10px; font-weight: 600;"></p>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main>
            <div class="header">
                <div class="hero-banner">
                    <div class="hero-content">
                        <span id="main-tag" class="tag" style="margin-bottom: 10px; display: inline-block;">TOKYO & KYOTO 2024</span>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <h1 id="main-title">오사카 & 교토 힐링 여행</h1>
                            <div class="edit-trigger" onclick="openEditModal('title')" style="cursor: pointer; padding: 10px;">
                                <i class="fas fa-edit" style="font-size: 1.4rem; opacity: 0.9;"></i>
                            </div>
                        </div>
                        <p id="main-date"><i class="far fa-calendar"></i> 2024.10.15 - 2024.10.22 (7박 8일)</p>
                    </div>
                </div>
                
                <!-- 모바일 전용/메인 코드 입력창 -->
                <div class="card" style="margin-top: 1.5rem; padding: 1rem; display: flex; gap: 10px; align-items: center; background: #fff; border: 1px solid #eee;">
                    <i class="fas fa-key" style="color: var(--primary);"></i>
                    <input type="text" id="main-trip-id-input" placeholder="이동할 여행 코드를 입력하세요" style="border: none; flex: 1; font-size: 0.9rem; outline: none;">
                    <button class="btn-map" style="margin-top: 0; padding: 8px 15px;" onclick="joinTripMain()">이동</button>
                </div>
            </div>

            <!-- 항공편 섹션 -->
            <section id="flights">
                <div class="flex-between" style="margin-bottom: 1.5rem;">
                    <h2 class="section-title" style="margin-bottom: 0;"><i class="fas fa-plane-departure"></i> 항공편 정보</h2>
                    <button class="btn-map" style="margin-top: 0; background: var(--text-sub);" onclick="openEditModal('flight')"><i class="fas fa-edit"></i> 수정</button>
                </div>
                <div id="flight-display" class="card flight-card">
                    <!-- Dynamic Content -->
                </div>
            </section>

            <!-- 렌트카 섹션 -->
            <section id="rental">
                <div class="flex-between" style="margin-bottom: 1.5rem;">
                    <h2 class="section-title" style="margin-bottom: 0;"><i class="fas fa-car"></i> 렌트카 예약</h2>
                    <button class="btn-map" style="margin-top: 0; background: var(--text-sub);" onclick="openEditModal('rental')"><i class="fas fa-edit"></i> 수정</button>
                </div>
                <div id="rental-display" class="card">
                    <!-- Dynamic Content -->
                </div>
            </section>

            <!-- 숙소 & 세부 일정 섹션 -->
            <section id="accommodation">
                <div class="flex-between" style="margin-bottom: 1.5rem;">
                    <h2 class="section-title" style="margin-bottom: 0;"><i class="fas fa-hotel"></i> 숙소 관리</h2>
                    <button class="btn-map" style="margin-top: 0;" onclick="openEditModal('stay')"><i class="fas fa-plus"></i> 숙소 추가</button>
                </div>
                
                <div class="accommodation-container" id="stay-container">
                    <!-- Dynamic Stays -->
                </div>

                <!-- 현재 여행 코드 표시 영역 -->
                <div class="card" style="margin-top: 2rem; text-align: center; background: #f8f9fa; border: 1px dashed var(--primary);">
                    <p style="font-size: 0.8rem; color: var(--text-sub); margin-bottom: 5px;">현재 여행의 공유 코드</p>
                    <h3 id="section-trip-id-display" style="color: var(--primary); font-size: 1.5rem; letter-spacing: 2px;">로딩 중...</h3>
                    <p style="font-size: 0.7rem; color: var(--text-sub); margin-top: 10px;"><i class="fas fa-info-circle"></i> 이 코드를 친구에게 알려주면 실시간으로 함께 계획할 수 있습니다!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- 모달 컨테이너 -->
    <div id="editModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h3 id="modalTitle" style="margin-bottom: 20px;">정보 수정</h3>
            <div id="modalBody">
                <!-- Dynamic Inputs -->
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-map" style="flex: 1; background: #eee; color: #333;" onclick="closeEditModal()">취소</button>
                <button class="btn-map" style="flex: 1;" onclick="saveEdit()">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 세부 일정 추가 모달 -->
    <div id="addSubModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">세부 일정 추가</h3>
            <label class="label">시간</label>
            <input type="time" id="itemTime">
            <label class="label">활동 내용</label>
            <input type="text" id="itemDesc" placeholder="예: 기요미즈데라 방문">
            <div style="display: flex; gap: 10px;">
                <button class="btn-map" style="flex: 1; background: #eee; color: #333;" onclick="closeSubModal()">취소</button>
                <button class="btn-map" style="flex: 1;" onclick="addItineraryItem()">추가하기</button>
            </div>
        </div>
    </div>

    <!-- 모바일 하단 내비게이션 -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>홈</span></a>
        <a href="#flights" class="nav-item"><i class="fas fa-plane"></i><span>항공권</span></a>
        <a href="#rental" class="nav-item"><i class="fas fa-car"></i><span>렌트카</span></a>
        <a href="#accommodation" class="nav-item"><i class="fas fa-hotel"></i><span>숙소</span></a>
    </nav>

    <!-- 동기화 상태 표시 -->
    <div id="sync-status" style="position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; z-index: 9999; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px);">
        <div id="sync-dot" style="width: 8px; height: 8px; background: #555; border-radius: 50%;"></div>
        <span id="sync-text">연결 확인 중...</span>
    </div>

    <script type="module" src="app.js?v=3.5"></script>
</body>
</html>
